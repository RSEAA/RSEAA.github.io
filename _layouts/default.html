<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
	{%- include header.html section="head" -%}
	<body>
		{%- include header.html section="header" -%}
    	<main class="page-content" aria-label="Content">
      		<div class="wrapper">
        	{%- if page.heading -%}
        		<h1 class="page-title">{{ page.heading | escape }}</h1>
        	{%- elsif page.title -%}
        		<h1 class="page-title">{{ page.title | escape }}</h1>
      		{%- endif -%}
        	{{ content }}
      		</div>
    	</main>
    	{%- include footer.html -%}
	<script>
		(function() {
			var navBtn = document.getElementById('nav-toggle-btn');
			var nav = document.getElementById('site-nav');
			if (navBtn && nav) {
				navBtn.addEventListener('click', function() {
					var open = nav.classList.toggle('is-open');
					navBtn.setAttribute('aria-expanded', open);
				});
			}
			var themeBtn = document.getElementById('theme-toggle-btn');
			if (themeBtn) {
				var root = document.documentElement;
				function updateThemeLabel() {
					themeBtn.setAttribute('aria-label', root.getAttribute('data-theme') === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
				}
				updateThemeLabel();
				themeBtn.addEventListener('click', function() {
					var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
					root.setAttribute('data-theme', next);
					localStorage.setItem('rseaa-theme', next);
					updateThemeLabel();
				});
			}
		})();
	</script>
 	</body>
</html>
